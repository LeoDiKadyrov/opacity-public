[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --cov=csv_utils
    --cov=config
    --cov=db_utils
    --cov=ddm_analyzer
    --cov=t0_detector
    --cov=duel_attempts
    --cov=kill_rate_analysis
    --cov-report=term-missing
    --cov-report=html
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (cwd-sensitive, skip in CI)
    requires_db: marks tests requiring analytics.db with post-rebatch duel_episodes data (skip if absent)
